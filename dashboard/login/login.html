<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Agrícola El Capricho</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

    <!-- panel izquierdo verde -->
    <div class="panel-izquierdo">
        <div class="login-logo">
            <span>Agrícola</span>
            <span>El</span>
            <span>Capricho</span>
            <span>SPA</span>
        </div>

        <p class="panel-descriptivo">
            Sistema de gestión de facturas y vencimientos interno
        </p>
    </div>

    <!-- panel derecho formulario -->
    <div class="panel-derecho">
        <div class="form-box">

            <div class="form-titulo">Iniciar sesión</div>
            <div class="form-subtitulo">Ingrese sus credenciales para iniciar sesión</div>

            <!-- mensaje error -->
            <div class="error" id="errorMsg">
                Usuario o contraseña incorrectos.
            </div>

            <!-- correo -->
            <div class="input">
                <label for="correo">Correo electrónico:</label>
                <input
                    type="email"
                    id="correo"
                    placeholder="correo@ejemplo.com"
                    autocomplete="email">
            </div>

            <!-- contraseña -->
            <div class="input">
                <label for="password">Contraseña:</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña"
                    autocomplete="current-password">
            </div>

            <!-- boton -->
            <button class="btn-login" id="btnLogin" onclick="handleLogin()">
                <span class="btn-texto" id="btnTexto">Ingresar</span>
                <div class="spinner" id="spinner"></div>
            </button>

        </div>
    </div>

    <script>
        async function handleLogin() {
            const correo = document.getElementById("correo").value.trim();
            const password = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("errorMsg");
            const btn = document.getElementById("btnLogin");
            const btnTexto = document.getElementById("btnTexto");
            const spinner = document.getElementById("spinner");

            /* limpiar error anterior */
            errorMsg.classList.remove("visible");

            /* validar campos vacios */
            if (!correo || !password) {
                errorMsg.textContent = "Por favor completa todos los campos.";
                errorMsg.classList.add("visible");
                return;
            }

            /* mostrar cargando */
            btn.disabled = true;
            btnTexto.style.display = "none";
            spinner.style.display = "block";

            try {
                /* aqui llamamos al backend */
                const res = await fetch("http://localhost:8080/user/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ correo, password })
                });

                const data = await res.json();

                if (res.ok) {
                    /* guardamos usuario en localstorage para usarlo en el dashboard */
                    localStorage.setItem("usuario", JSON.stringify(data));
                    window.location.href = "../index.html";
                } else {
                    errorMsg.textContent = data.mensaje || "Usuario o contraseña incorrectos.";
                    errorMsg.classList.add("visible");
                }

            } catch (e) {
                /* error de conexion con el servidor */
                errorMsg.textContent = "Error de conexión con el servidor.";
                errorMsg.classList.add("visible");
            } finally {
                btn.disabled = false;
                btnTexto.style.display = "block";
                spinner.style.display = "none";
            }
        }

        /* entrar con Enter */
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") handleLogin();
        });
    </script>

</body>
</html>
